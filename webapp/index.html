<!doctype html>
<html>
  <head>
    <title>Slang-lang explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="panel">
      <p>
        Choose example:
        <select id="example-menu"></select>
      </p>
      <textarea id="input-code" class="code" spellcheck="false"></textarea>
    </section>

    <section class="panel">
      <p>
        Compiler arguments:
        <input id="extra-args" type="text" value="--backend-wasm" />
        Choose backend:
        <select id="backend-menu">
          <option value="--backend-wasm">WebAssembly</option>
          <option value="--backend-wat">WebAssembly (text)</option>
          <option value="--backend-py">Python</option>
          <option value="--backend-c">C</option>
          <option value="--backend-c-v2">C (v2)</option>
          <option value="--backend-x86">x86</option>
          <option value="--backend-bc">Bytecode</option>
          <option value="--backend-sil">SIL</option>
          <option value="--backend-slang">Slang</option>
        </select>
      </p>
      <p>
        <input id="run-button" type="button" value="Run code" />
      </p>
      <textarea
        id="output-code"
        class="code"
        spellcheck="false"
        readonly
      ></textarea>
    </section>

    <section class="panel">
      <textarea
        id="console-output"
        class="code"
        spellcheck="false"
        readonly
      ></textarea>
      <p>
        <input id="clear-console-button" type="button" value="Clear console" />
        <input id="run-tests-button" type="button" value="Run tests" />
      </p>
      <p>
        <select id="app-menu"></select>
        <input id="app-arguments" type="text" value="-S foo.py" />
        <input id="run-app-button" type="button" value="Run" />
      </p>
    </section>

    <section class="panel">
      Documentation
      <ul>
        <li><a href="docs/libbase.html">base</a></li>
        <li><a href="docs/libimage.html">image</a></li>
        <li><a href="docs/libscience.html">science</a></li>
        <li><a href="docs/libweb.html">web</a></li>
        <li><a href="docs/libgfx.html">gfx</a></li>
        <li><a href="docs/libcompiler.html">compiler</a></li>
      </ul>
    </section>

    <script lang="javascript" src="webrt.js" type="module"></script>
  </body>
</html>
